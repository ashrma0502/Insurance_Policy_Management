<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Portal Access - Insure Insurance Policy Management System</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <!-- Bootstrap 5.3.8 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <!-- Spinner Start -->
  <div id="spinner"
    class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-grow text-primary" role="status"></div>
  </div>
  <!-- Spinner End -->

  <!-- Header Start (Minimal Brand Banner) -->
  <div
    class="container-fluid bg-white shadow-sm py-3 px-4 px-lg-5 mb-5 d-flex align-items-center justify-content-center">
    <div class="d-flex align-items-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor"
        class="bi bi-shield-shaded text-primary me-3 align-middle" viewBox="0 0 16 16">
        <path
          d="M8 14.933a1 1 0 0 0 .1-.063l.1-.064a5 5 0 0 0 1.254-1.562C10.22 11.83 10.5 9.779 10.5 8c0-1.85-.295-3.69-.74-5.064a3 3 0 0 0-.256-.563l-.096-.16a1 1 0 0 0-.107-.123C9.07 1.832 8.522 1.5 8 1.5v13.433zM8 0c-.69 0-1.843.268-2.9.76a4 4 0 0 0-1.61 1.777C3.07 3.905 2.5 5.86 2.5 8c0 2.45.626 4.7 1.528 6.166A4 4 0 0 0 5.61 15.9c1.077.5 2.124.6 2.39.6.266 0 1.313-.1 2.39-.6a4 4 0 0 0 1.58-1.734c.902-1.467 1.528-3.717 1.528-6.166 0-2.14-.57-4.095-1.99-5.463A4 4 0 0 0 8.001 0z" />
      </svg>
      <span class="fs-3 fw-bold text-dark text-uppercase tracking-wider">Insurance Policy Management System</span>
    </div>
  </div>
  <!-- Header End -->

  <!-- Login Area Start -->
  <div class="container px-4">
    <div class="login-container">
      <div class="card card-login p-4 p-md-5">
        <div class="text-center mb-4">
          <h2 class="text-primary text-uppercase tracking-wide">Portal Access</h2>
          <p class="text-muted">Sign in to manage policies, schedules, and claims</p>
        </div>


        <!-- Normal Form -->
        <form id="loginForm" action="/login" method="POST">
          {% if error %}
          <div class="alert alert-danger mb-3 small"><i class="bi bi-exclamation-circle-fill me-2"></i>{{ error }}</div>
          {% endif %}
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username"
              required />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required />
          </div>
          <div class="mb-4">
            <label for="role" class="form-label">Portal Role</label>
            <select class="form-select" id="role" name="role" required>
              <option value="" disabled selected>Select your role...</option>
              <option value="admin">Admin / Underwriter</option>
              <option value="agent">Registered Agent</option>
              <option value="policyholder">Policyholder</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-3 text-uppercase tracking-wider">Sign In</button>
        </form>
      </div>
    </div>
  </div>
  <!-- Login Area End -->

  <!-- Footer Start -->
  <div class="container-fluid bg-dark footer mt-5 pt-5">
    <div class="container py-5">
      <div class="row g-5">
        <div class="col-lg-6 col-md-6">
          <h1 class="text-white mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="currentColor"
              class="bi bi-shield-shaded text-white me-3 align-middle" viewBox="0 0 16 16">
              <path
                d="M8 14.933a1 1 0 0 0 .1-.063l.1-.064a5 5 0 0 0 1.254-1.562C10.22 11.83 10.5 9.779 10.5 8c0-1.85-.295-3.69-.74-5.064a3 3 0 0 0-.256-.563l-.096-.16a1 1 0 0 0-.107-.123C9.07 1.832 8.522 1.5 8 1.5v13.433zM8 0c-.69 0-1.843.268-2.9.76a4 4 0 0 0-1.61 1.777C3.07 3.905 2.5 5.86 2.5 8c0 2.45.626 4.7 1.528 6.166A4 4 0 0 0 5.61 15.9c1.077.5 2.124.6 2.39.6.266 0 1.313-.1 2.39-.6a4 4 0 0 0 1.58-1.734c.902-1.467 1.528-3.717 1.528-6.166 0-2.14-.57-4.095-1.99-5.463A4 4 0 0 0 8.001 0z" />
            </svg>Insure
          </h1>
          <p>Ledger-accurate schedule modeling and claims adjudication workflows.</p>
        </div>
        <div class="col-lg-6 col-md-6 text-md-end">
          <h5 class="text-light mb-4">Support</h5>
          <p><i class="bi bi-telephone-fill me-3"></i>+012 345 6789</p>
          <p><i class="bi bi-envelope-fill me-3"></i>portal-support@insure.com</p>
        </div>
      </div>
    </div>
  </div>
  <!-- Footer End -->

  <!-- Bootstrap 5.3.8 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <script src="/static/scripts.js"></script>


</body>

</html>
